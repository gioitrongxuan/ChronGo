server {
    listen 80;
    server_name chrongo.streamdy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chrongo.streamdy.com;

    ssl_certificate     /etc/letsencrypt/live/chrongo.streamdy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chrongo.streamdy.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/chrongo;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|ico|svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "no-referrer"  always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types text/css text/javascript application/javascript image/svg+xml;
}
